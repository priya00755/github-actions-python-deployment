name: Deploy Python App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      - name: Add EC2 to Known Hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Application
        run: |
          ssh -i ~/.ssh/key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "🚀 Deployment started..."

          # Create app directory
          mkdir -p ~/app
          cd ~/app

          # Clone or update repo
          if [ -d ".git" ]; then
            git pull origin main
          else
            git clone https://github.com/<your-username>/<your-repo>.git .
          fi

          # Install dependencies
          sudo yum update -y || sudo apt update -y
          sudo yum install -y python3 git || sudo apt install -y python3 git
          sudo yum install -y python3-pip || sudo apt install -y python3-pip

          # Install Python packages
          pip3 install -r requirements.txt

          # Stop existing app if running
          pkill -f app.py || true

          # Run application in background
          nohup python3 app.py > output.log 2>&1 &

          echo "✅ Deployment completed successfully!"
